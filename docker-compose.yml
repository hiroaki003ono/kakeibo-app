version: '3.8'

services:
  # PHPとApacheのコンテナ
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
  
  # MySQLのコンテナ
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: kakeibo_db
      MYSQL_USER: kakeibo_user
      MYSQL_PASSWORD: kakeibo_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
  
  # phpMyAdminのコンテナ
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root

volumes:
  db_data: